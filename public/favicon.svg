  <line x1="104" y1="172" x2="104" y2="200" stroke="#000000" stroke-width="6" />
  <line x1="120" y1="172" x2="120" y2="202" stroke="#000000" stroke-width="6" />
  <line x1="136" y1="172" x2="136" y2="202" stroke="#000000" stroke-width="6" />
  <line x1="152" y1="172" x2="152" y2="200" stroke="#000000" stroke-width="6" />

  <!-- Solid Black Eyes -->
