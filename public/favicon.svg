  </defs>

  <!-- Solid Black Background -->
  <rect width="256" height="256" rx="48" fill="#000000" />

  <!-- Detailed Bones (Flat White) -->
  <g transform="translate(128, 140) rotate(45) translate(-128, -128)">
    <use href="#bone" />
  </g>
  <g transform="translate(128, 140) rotate(-45) translate(-128, -128)">
